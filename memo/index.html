<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Notepad</title>
    <meta name="description" content="A simple, elegant, and powerful web-based notepad app.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            height: fit-content;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: var(--radius);
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button#add-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button#add-btn:active {
            transform: translateY(0);
        }

        /* List Area */
        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        li {
            background: white;
            padding: 1rem 1.2rem;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease-out;
            border: 1px solid #f1f5f9;
            transition: transform 0.2s ease;
        }

        li:hover {
            transform: scale(1.02);
        }

        .memo-text {
            flex: 1;
            font-size: 1rem;
            color: var(--text-main);
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .memo-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Checkbox Styling */
        .checkbox-wrapper {
            margin-right: 1rem;
            display: flex;
            align-items: center;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            background: white;
        }

        .custom-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .custom-checkbox:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        .removing {
            animation: fadeOut 0.2s ease-out forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>My Memos</h1>
            <p>메모를 자유롭게 기록하세요</p>
        </header>

        <section class="input-area">
            <div class="input-group">
                <input type="text" id="memo-input" placeholder="새로운 메모를 입력하세요..." maxlength="100">
                <button id="add-btn">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </section>

        <section class="list-area">
            <ul id="memo-list">
                <!-- Memos will be added here -->
            </ul>
        </section>
    </div>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://shnzjkxjvznrrfjuvwmb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNobnpqa3hqdnpucnJmanV2d21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTc1OTEsImV4cCI6MjA5MjkzMzU5MX0.dqM9ekDbLCE5907PfR2OppMEV481Hw1hLl7eWfCya20';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Initialize Lucide icons
        lucide.createIcons();

        const input = document.getElementById('memo-input');
        const addBtn = document.getElementById('add-btn');
        const list = document.getElementById('memo-list');

        let memos = [];

        async function fetchMemos() {
            try {
                const { data, error } = await supabaseClient
                    .from('memos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                memos = data;
                renderMemos();
            } catch (error) {
                console.error('Error fetching memos:', error.message);
                list.innerHTML = `<div class="empty-state" style="color: var(--error)">데이터를 불러오는데 실패했습니다. (Table 'memos'가 있는지 확인하세요)</div>`;
            }
        }

        function renderMemos() {
            list.innerHTML = '';

            if (memos.length === 0) {
                list.innerHTML = `<div class="empty-state">아직 추가된 메모가 없습니다.</div>`;
                return;
            }

            memos.forEach((memo) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="checkbox-wrapper" onclick="toggleMemo(${memo.id}, ${memo.completed})">
                        <div class="custom-checkbox ${memo.completed ? 'checked' : ''}">
                            <i data-lucide="check" style="width: 14px; height: 14px; visibility: ${memo.completed ? 'visible' : 'hidden'}"></i>
                        </div>
                    </div>
                    <span class="memo-text ${memo.completed ? 'completed' : ''}">${memo.text}</span>
                    <button class="delete-btn" onclick="deleteMemo(${memo.id}, this)" aria-label="Delete memo">
                        <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                    </button>
                `;
                list.appendChild(li);
            });

            lucide.createIcons();
        }

        async function addMemo() {
            const text = input.value.trim();
            if (text) {
                const { data, error } = await supabaseClient
                    .from('memos')
                    .insert([{ text: text, completed: false }])
                    .select();

                if (error) {
                    console.error('Error adding memo:', error.message);
                    return;
                }

                input.value = '';
                fetchMemos(); // Refresh list
                input.focus();
            }
        }

        async function toggleMemo(id, currentStatus) {
            const { error } = await supabaseClient
                .from('memos')
                .update({ completed: !currentStatus })
                .eq('id', id);

            if (error) {
                console.error('Error toggling memo:', error.message);
                return;
            }
            fetchMemos();
        }

        async function deleteMemo(id, btnElement) {
            const li = btnElement.closest('li');
            li.classList.add('removing');

            const { error } = await supabaseClient
                .from('memos')
                .delete()
                .eq('id', id);

            if (error) {
                console.error('Error deleting memo:', error.message);
                li.classList.remove('removing');
                return;
            }

            setTimeout(() => {
                fetchMemos();
            }, 200);
        }

        addBtn.addEventListener('click', addMemo);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addMemo();
            }
        });

        // Initial fetch
        fetchMemos();
    </script>
</body>

</html>
